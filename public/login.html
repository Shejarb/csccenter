<!DOCTYPE html>
<html>
<head>
  <title>Admin Login</title>
  <style>
    body { font-family: Arial; background:#f4f6f9; text-align:center; }
    .box {
      margin: 100px auto;
      width: 300px;
      padding: 20px;
      background: white;
      border-radius: 10px;
    }
    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
    }
    button {
      width: 100%;
      padding: 10px;
      background: #ff7a59;
      color: white;
      border: none;
    }
  </style>
</head>
<body>

<div class="box">
  <h2>🔐 Admin Login</h2>

  <input type="text" id="user" placeholder="Username">
  <input type="password" id="pass" placeholder="Password">

  <button onclick="login()">Login</button>
</div>

<script>
function login() {
  fetch("/login", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      username: user.value,
      password: pass.value
    })
  })
  .then(res => res.json())
  .then(data => {
    if(data.success) {
      localStorage.setItem("auth", "true");
      window.location.href = "dashboard.html";
    } else {
      alert("Wrong credentials");
    }
  });
}
</script>

</body>
</html>
